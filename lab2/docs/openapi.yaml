openapi: 3.0.3
info:
  title: Budget Service API
  description: |
    REST API для приложения бюджетирования.
    Позволяет управлять планируемыми доходами и расходами, а также
    просматривать динамику бюджета за произвольный период.
  version: 1.0.0
  contact:
    name: Budget Service

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Auth
    description: Регистрация и аутентификация
  - name: Users
    description: Поиск пользователей
  - name: Incomes
    description: Планируемые доходы
  - name: Expenses
    description: Планируемые расходы
  - name: Budget
    description: Динамика бюджета

paths:
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Регистрация нового пользователя
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              login: ivan_petrov
              password: password123
              first_name: Иван
              last_name: Петров
      responses:
        '201':
          description: Пользователь успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
              example:
                id: 1
                login: ivan_petrov
                first_name: Иван
                last_name: Петров
        '400':
          description: Некорректные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Fields login, password, first_name, last_name are required"
        '409':
          description: Пользователь с таким логином уже существует
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "User with this login already exists"

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Аутентификация пользователя
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              login: ivan_petrov
              password: password123
      responses:
        '200':
          description: Успешная аутентификация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                token: "a1b2c3d4e5f6...64hex"
        '400':
          description: Некорректные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Неверный логин или пароль
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Invalid login or password"

  /api/v1/users/search:
    get:
      tags: [Users]
      summary: Поиск пользователей
      description: |
        Поиск пользователя по точному логину или по маске имени/фамилии.
        Необходимо передать один из параметров: login или name.
      operationId: searchUsers
      security:
        - BearerAuth: []
      parameters:
        - name: login
          in: query
          description: Точный логин пользователя
          schema:
            type: string
          example: ivan_petrov
        - name: name
          in: query
          description: Маска для поиска по имени или фамилии (подстрока, регистронезависимо)
          schema:
            type: string
          example: Иван
      responses:
        '200':
          description: Список найденных пользователей
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
              example:
                - id: 1
                  login: ivan_petrov
                  first_name: Иван
                  last_name: Петров
        '400':
          description: Не указан параметр поиска
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Требуется аутентификация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/incomes:
    get:
      tags: [Incomes]
      summary: Получить перечень планируемых доходов
      operationId: getIncomes
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Список планируемых доходов текущего пользователя
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IncomeResponse'
              example:
                - id: 1
                  user_id: 1
                  category: Зарплата
                  amount: 150000.0
                  date: "2024-01-15"
                  description: Основная зарплата
        '401':
          description: Требуется аутентификация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags: [Incomes]
      summary: Создать планируемый доход
      operationId: createIncome
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIncomeRequest'
            example:
              category: Зарплата
              amount: 150000.0
              date: "2024-01-15"
              description: Основная зарплата
      responses:
        '201':
          description: Доход успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncomeResponse'
        '400':
          description: Некорректные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Требуется аутентификация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/expenses:
    get:
      tags: [Expenses]
      summary: Получить перечень планируемых расходов
      operationId: getExpenses
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Список планируемых расходов текущего пользователя
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExpenseResponse'
              example:
                - id: 1
                  user_id: 1
                  category: Продукты
                  amount: 15000.0
                  date: "2024-01-10"
                  description: Еженедельные покупки
        '401':
          description: Требуется аутентификация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags: [Expenses]
      summary: Создать планируемый расход
      operationId: createExpense
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExpenseRequest'
            example:
              category: Продукты
              amount: 15000.0
              date: "2024-01-10"
              description: Еженедельные покупки
      responses:
        '201':
          description: Расход успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseResponse'
        '400':
          description: Некорректные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Требуется аутентификация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/incomes/{id}:
    put:
      tags: [Incomes]
      summary: Обновить планируемый доход
      operationId: updateIncome
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Идентификатор дохода
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIncomeRequest'
      responses:
        '200':
          description: Доход обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncomeResponse'
        '400':
          description: Некорректные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Требуется аутентификация
        '404':
          description: Доход не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Incomes]
      summary: Удалить планируемый доход
      operationId: deleteIncome
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Идентификатор дохода
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Доход удалён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '401':
          description: Требуется аутентификация
        '404':
          description: Доход не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/expenses/{id}:
    put:
      tags: [Expenses]
      summary: Обновить планируемый расход
      operationId: updateExpense
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Идентификатор расхода
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExpenseRequest'
      responses:
        '200':
          description: Расход обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseResponse'
        '400':
          description: Некорректные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Требуется аутентификация
        '404':
          description: Расход не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Expenses]
      summary: Удалить планируемый расход
      operationId: deleteExpense
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Идентификатор расхода
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Расход удалён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '401':
          description: Требуется аутентификация
        '404':
          description: Расход не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/budget/dynamics:
    get:
      tags: [Budget]
      summary: Получить динамику бюджета за период
      description: |
        Возвращает суммарные доходы, расходы и баланс за указанный период,
        а также разбивку по дням.
      operationId: getBudgetDynamics
      security:
        - BearerAuth: []
      parameters:
        - name: from
          in: query
          required: true
          description: Начало периода (YYYY-MM-DD)
          schema:
            type: string
            format: date
          example: "2024-01-13"
        - name: to
          in: query
          required: true
          description: Конец периода (YYYY-MM-DD)
          schema:
            type: string
            format: date
          example: "2024-01-15"
      responses:
        '200':
          description: Динамика бюджета за период
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetDynamicsResponse'
              example:
                total_income: 150000.0
                total_expense: 25000.0
                balance: 125000.0
                period_from: "2024-01-13"
                period_to: "2024-01-15"
                daily:
                  - date: "2024-01-13"
                    income: 0.0
                    expense: 10000.0
                    balance: -10000.0
                  - date: "2024-01-14"
                    income: 0.0
                    expense: 15000.0
                    balance: -15000.0
                  - date: "2024-01-15"
                    income: 150000.0
                    expense: 0.0
                    balance: 150000.0
        '400':
          description: Не указан период
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Требуется аутентификация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ping:
    get:
      tags: [System]
      summary: Health check
      operationId: ping
      responses:
        '200':
          description: Service is alive

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Bearer token, полученный при логине через /api/v1/auth/login

  schemas:
    RegisterRequest:
      type: object
      required: [login, password, first_name, last_name]
      properties:
        login:
          type: string
          minLength: 1
          description: Уникальный логин
        password:
          type: string
          minLength: 1
          description: Пароль
        first_name:
          type: string
          minLength: 1
          description: Имя
        last_name:
          type: string
          minLength: 1
          description: Фамилия

    LoginRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: Bearer token для авторизации

    UserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        login:
          type: string
        first_name:
          type: string
        last_name:
          type: string

    CreateIncomeRequest:
      type: object
      required: [category, amount, date]
      properties:
        category:
          type: string
          description: Категория дохода
        amount:
          type: number
          format: double
          minimum: 0.01
          description: Сумма
        date:
          type: string
          format: date
          description: Дата (YYYY-MM-DD)
        description:
          type: string
          description: Описание

    IncomeResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        category:
          type: string
        amount:
          type: number
          format: double
        date:
          type: string
          format: date
        description:
          type: string

    CreateExpenseRequest:
      type: object
      required: [category, amount, date]
      properties:
        category:
          type: string
          description: Категория расхода
        amount:
          type: number
          format: double
          minimum: 0.01
          description: Сумма
        date:
          type: string
          format: date
          description: Дата (YYYY-MM-DD)
        description:
          type: string
          description: Описание

    ExpenseResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        category:
          type: string
        amount:
          type: number
          format: double
        date:
          type: string
          format: date
        description:
          type: string

    BudgetDynamicsResponse:
      type: object
      properties:
        total_income:
          type: number
          format: double
        total_expense:
          type: number
          format: double
        balance:
          type: number
          format: double
        period_from:
          type: string
          format: date
        period_to:
          type: string
          format: date
        daily:
          type: array
          items:
            $ref: '#/components/schemas/DailyEntry'

    DailyEntry:
      type: object
      properties:
        date:
          type: string
          format: date
        income:
          type: number
          format: double
        expense:
          type: number
          format: double
        balance:
          type: number
          format: double

    DeleteResponse:
      type: object
      properties:
        status:
          type: string
          description: Статус операции
          example: deleted

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Описание ошибки
